<!DOCTYPE html>
<html>
<head>
  <title>Forgotten Gonza</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    body { margin:0; overflow:hidden; background:black; font-family:Arial; color:white; touch-action:none; }

    #ui {
      position:fixed; top:15px; left:15px; font-size:22px; z-index:5;
      text-shadow:2px 2px 6px black;
    }

    #msg, #lobby {
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      text-align:center; font-size:28px; z-index:6; background:rgba(0,0,0,.65); padding:30px;
      flex-direction:column; gap:12px;
    }

    input, button {
      font-size:20px; padding:10px 14px; border-radius:8px; border:none;
    }

    button { cursor:pointer; }

    #staticOverlay {
      position:fixed; inset:0; pointer-events:none; z-index:4;
      background:url("https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif");
      opacity:0; mix-blend-mode:screen;
    }

    #jumpscareScreen {
      position:fixed; inset:0; z-index:999; background-image:url("warden.png");
      background-size:cover; background-position:center; background-repeat:no-repeat; display:none;
    }

    #mobileControls { position:fixed; inset:0; pointer-events:none; z-index:20; }

    #joystick {
      position:fixed; left:25px; bottom:25px; width:120px; height:120px;
      border:3px solid rgba(255,255,255,.45); border-radius:50%;
      pointer-events:auto; display:none;
    }

    #stick {
      position:absolute; left:35px; top:35px; width:50px; height:50px;
      background:rgba(255,255,255,.55); border-radius:50%;
    }

    #jumpBtn {
      position:fixed; right:30px; bottom:35px; width:90px; height:90px;
      border-radius:50%; background:rgba(255,255,255,.55); color:black;
      font-weight:bold; font-size:20px; display:none; pointer-events:auto;
    }

    @media (max-width: 900px) {
      #joystick, #jumpBtn { display:block; }
      #msg, #lobby { font-size:23px; }
    }
  </style>
</head>

<body>
<div id="ui">Baseballs: 0 / 8</div>

<div id="lobby">
  <div><b>Forgotten Gonza Multiplayer</b></div>
  <div style="font-size:18px;">Enter a private lobby code or create one.</div>
  <input id="roomInput" placeholder="Example: GONZA123">
  <button id="joinBtn">Join Lobby</button>
  <button id="soloBtn">Play Solo</button>
  <div id="lobbyStatus" style="font-size:15px;color:#ccc;"></div>
</div>

<div id="msg" style="display:none;">
  Forgotten Gonza<br><br>
  Click or tap to begin<br><br>
  WASD to move · Space to jump · Mouse to look<br>
  Mobile: joystick to move · jump button · swipe to look<br><br>
  Collect 8 baseballs. Avoid The Warden.
</div>

<div id="staticOverlay"></div>
<div id="jumpscareScreen"></div>

<div id="mobileControls">
  <div id="joystick"><div id="stick"></div></div>
  <button id="jumpBtn">JUMP</button>
</div>

<audio id="ambient" src="ambient.mp3" loop></audio>
<audio id="staticSound" src="static.mp3" loop></audio>
<audio id="jump" src="jumpscare3.mp3" preload="auto"></audio>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

/* CHANGE THIS WHEN YOU HAVE A SERVER */
const SERVER_URL = "https://YOUR-SOCKET-SERVER.onrender.com";

let socket = null;
let roomCode = null;
let multiplayerEnabled = false;
let otherPlayers = {};

let scene, camera, renderer;
let keys = {};
let started = false;
let gameOver = false;
let collected = 0;

let direction = new THREE.Vector3();
let yaw = 0;
let pitch = 0;

let verticalVelocity = 0;
let onGround = true;
const gravity = 0.018;
const jumpStrength = 0.34;
const groundY = 2;

let mobileMoveX = 0;
let mobileMoveZ = 0;
let activeLookTouchId = null;
let lastTouchX = null;
let lastTouchY = null;

let sigils = [];
let warden;

const ui = document.getElementById("ui");
const msg = document.getElementById("msg");
const lobby = document.getElementById("lobby");
const roomInput = document.getElementById("roomInput");
const joinBtn = document.getElementById("joinBtn");
const soloBtn = document.getElementById("soloBtn");
const lobbyStatus = document.getElementById("lobbyStatus");

const staticOverlay = document.getElementById("staticOverlay");
const jumpscareScreen = document.getElementById("jumpscareScreen");

const ambient = document.getElementById("ambient");
const staticSound = document.getElementById("staticSound");
const jumpAudio = document.getElementById("jump");

const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");
const jumpBtn = document.getElementById("jumpBtn");

init();
animate();

joinBtn.onclick = () => {
  const code = roomInput.value.trim().toUpperCase() || "GONZA-" + Math.floor(Math.random() * 9999);
  connectMultiplayer(code);
};

soloBtn.onclick = () => {
  lobby.style.display = "none";
  msg.style.display = "flex";
};

function connectMultiplayer(code) {
  roomCode = code;
  lobbyStatus.innerText = "Connecting...";

  try {
    socket = io(SERVER_URL, { transports:["websocket"] });

    socket.on("connect", () => {
      multiplayerEnabled = true;
      socket.emit("joinRoom", roomCode);
      lobby.style.display = "none";
      msg.style.display = "flex";
    });

    socket.on("connect_error", () => {
      lobbyStatus.innerText = "Could not connect. Check SERVER_URL/server.";
    });

    socket.on("playersUpdate", players => {
      if (!socket) return;

      for (const id in players) {
        if (id === socket.id) continue;

        const p = players[id];

        if (!otherPlayers[id]) {
          otherPlayers[id] = makeOtherPlayer();
          scene.add(otherPlayers[id]);
        }

        otherPlayers[id].position.set(p.x, p.y, p.z);
      }

      for (const id in otherPlayers) {
        if (!players[id]) {
          scene.remove(otherPlayers[id]);
          delete otherPlayers[id];
        }
      }
    });
  } catch {
    lobbyStatus.innerText = "Socket failed. You can still play solo.";
  }
}

function makeOtherPlayer() {
  const group = new THREE.Group();

  const body = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.45, 1.4, 6, 12),
    new THREE.MeshStandardMaterial({ color:0x00aaff })
  );
  body.position.y = 1.1;
  group.add(body);

  return group;
}

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x182018);
  scene.fog = new THREE.Fog(0x182018, 40, 160);

  camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
  camera.position.set(0, groundY, 18);

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0x707070));

  const sun = new THREE.DirectionalLight(0xffffff, 1.3);
  sun.position.set(40, 80, 20);
  scene.add(sun);

  const flashlight = new THREE.SpotLight(0xffffff, 4, 80, Math.PI / 5, 0.4, 1);
  camera.add(flashlight);
  flashlight.target.position.set(0, 0, -1);
  camera.add(flashlight.target);
  scene.add(camera);

  makeBaseballField();
  makeSigils();
  makeWarden();

  document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
    if (e.code === "Space") doJump();
  });

  document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

  document.body.addEventListener("click", startGame);
  document.body.addEventListener("touchstart", startGame, { passive:false });

  document.addEventListener("mousemove", lookAround);

  jumpBtn.addEventListener("touchstart", e => {
    e.preventDefault();
    doJump();
  }, { passive:false });

  setupMobileControls();

  window.addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

function makeBaseballField() {
  const grass = new THREE.Mesh(
    new THREE.PlaneGeometry(240, 240),
    new THREE.MeshStandardMaterial({ color:0x235c25 })
  );
  grass.rotation.x = -Math.PI / 2;
  scene.add(grass);

  const dirtMat = new THREE.MeshStandardMaterial({ color:0x9b6a3c });
  const lineMat = new THREE.MeshBasicMaterial({ color:0xffffff });

  const infield = new THREE.Mesh(new THREE.CircleGeometry(32, 64), dirtMat);
  infield.rotation.x = -Math.PI / 2;
  infield.position.y = 0.01;
  scene.add(infield);

  const mound = new THREE.Mesh(new THREE.CircleGeometry(5, 32), dirtMat);
  mound.rotation.x = -Math.PI / 2;
  mound.position.set(0, 0.03, -10);
  scene.add(mound);

  const bases = [
    [0, 0], [18, -18], [0, -36], [-18, -18]
  ];

  bases.forEach(([x,z]) => {
    const base = new THREE.Mesh(
      new THREE.BoxGeometry(3, 0.18, 3),
      new THREE.MeshStandardMaterial({ color:0xffffff })
    );
    base.position.set(x, 0.12, z);
    base.rotation.y = Math.PI / 4;
    scene.add(base);
  });

  makeLine(0, 0, 80, -80, lineMat);
  makeLine(0, 0, -80, -80, lineMat);
  makeLine(18, -18, 0, -36, lineMat);
  makeLine(0, -36, -18, -18, lineMat);
  makeLine(-18, -18, 0, 0, lineMat);
  makeLine(0, 0, 18, -18, lineMat);

  const fenceMat = new THREE.MeshStandardMaterial({ color:0x0b2c0b });
  for (let i = 0; i < 40; i++) {
    const angle = Math.PI + i * Math.PI / 39;
    const x = Math.cos(angle) * 95;
    const z = Math.sin(angle) * 95 - 10;

    const post = new THREE.Mesh(new THREE.BoxGeometry(2, 7, 2), fenceMat);
    post.position.set(x, 3.5, z);
    scene.add(post);
  }

  const wall = new THREE.Mesh(
    new THREE.BoxGeometry(190, 8, 2),
    new THREE.MeshStandardMaterial({ color:0x123d12 })
  );
  wall.position.set(0, 4, -98);
  scene.add(wall);

  makeLightPole(-60, -55);
  makeLightPole(60, -55);
}

function makeLine(x1, z1, x2, z2, mat) {
  const dx = x2 - x1;
  const dz = z2 - z1;
  const len = Math.hypot(dx, dz);

  const line = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.05, len), mat);
  line.position.set((x1+x2)/2, 0.08, (z1+z2)/2);
  line.rotation.y = Math.atan2(dx, dz);
  scene.add(line);
}

function makeLightPole(x, z) {
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5, 0.7, 30, 12),
    new THREE.MeshStandardMaterial({ color:0x555555 })
  );
  pole.position.set(x, 15, z);
  scene.add(pole);

  const light = new THREE.PointLight(0xffffff, 1.8, 90);
  light.position.set(x, 31, z);
  scene.add(light);
}

function makeSigils() {
  const positions = [
    [0, 2.3, 0], [18, 2.3, -18], [0, 2.3, -36], [-18, 2.3, -18],
    [45, 2.3, -55], [-45, 2.3, -55], [65, 2.3, -20], [-65, 2.3, -20]
  ];

  positions.forEach(pos => {
    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(1.2, 24, 24),
      new THREE.MeshStandardMaterial({ color:0xffffff })
    );
    ball.position.set(...pos);
    ball.userData.taken = false;

    const seam = new THREE.Mesh(
      new THREE.TorusGeometry(1.22, 0.035, 8, 36),
      new THREE.MeshBasicMaterial({ color:0xff0000 })
    );
    seam.rotation.x = Math.PI / 2;
    ball.add(seam);

    scene.add(ball);
    sigils.push(ball);
  });
}

function makeWarden() {
  const texture = new THREE.TextureLoader().load("warden.png");
  const mat = new THREE.SpriteMaterial({ map:texture, transparent:true });

  warden = new THREE.Sprite(mat);
  warden.position.set(45, 3, 45);
  warden.scale.set(7, 9, 1);
  scene.add(warden);
}

function startGame() {
  if (started || lobby.style.display !== "none") return;

  started = true;
  msg.style.display = "none";

  if (!isMobile()) document.body.requestPointerLock();

  ambient.volume = 0.45;
  staticSound.volume = 0;
  ambient.play().catch(() => {});
  staticSound.play().catch(() => {});
}

function isMobile() {
  return window.innerWidth <= 900;
}

function lookAround(e) {
  if (!started || gameOver) return;
  if (!isMobile() && document.pointerLockElement !== document.body) return;

  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-1.3, Math.min(1.3, pitch));

  camera.rotation.order = "YXZ";
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;
}

function setupMobileControls() {
  joystick.addEventListener("touchmove", e => {
    e.preventDefault();

    const rect = joystick.getBoundingClientRect();
    const touch = e.touches[0];

    let x = touch.clientX - rect.left - rect.width / 2;
    let y = touch.clientY - rect.top - rect.height / 2;

    const max = 45;
    const length = Math.hypot(x, y);

    if (length > max) {
      x = (x / length) * max;
      y = (y / length) * max;
    }

    stick.style.left = `${35 + x}px`;
    stick.style.top = `${35 + y}px`;

    mobileMoveX = x / max;
    mobileMoveZ = y / max;
  }, { passive:false });

  joystick.addEventListener("touchend", () => {
    mobileMoveX = 0;
    mobileMoveZ = 0;
    stick.style.left = "35px";
    stick.style.top = "35px";
  });

  document.addEventListener("touchstart", e => {
    if (!started || gameOver) return;

    for (let touch of e.changedTouches) {
      const inJoystickArea = touch.clientX < 180 && touch.clientY > innerHeight - 180;
      const inJumpArea = touch.clientX > innerWidth - 140 && touch.clientY > innerHeight - 150;

      if (!inJoystickArea && !inJumpArea && activeLookTouchId === null) {
        activeLookTouchId = touch.identifier;
        lastTouchX = touch.clientX;
        lastTouchY = touch.clientY;
      }
    }
  }, { passive:false });

  document.addEventListener("touchmove", e => {
    if (!started || gameOver) return;
    e.preventDefault();

    for (let touch of e.touches) {
      if (touch.identifier === activeLookTouchId) {
        const dx = touch.clientX - lastTouchX;
        const dy = touch.clientY - lastTouchY;

        yaw -= dx * 0.0017;
        pitch -= dy * 0.0017;
        pitch = Math.max(-1.1, Math.min(1.1, pitch));

        camera.rotation.order = "YXZ";
        camera.rotation.y = yaw;
        camera.rotation.x = pitch;

        lastTouchX = touch.clientX;
        lastTouchY = touch.clientY;
      }
    }
  }, { passive:false });

  document.addEventListener("touchend", e => {
    for (let touch of e.changedTouches) {
      if (touch.identifier === activeLookTouchId) {
        activeLookTouchId = null;
        lastTouchX = null;
        lastTouchY = null;
      }
    }
  });
}

function doJump() {
  if (onGround && started && !gameOver) {
    verticalVelocity = jumpStrength;
    onGround = false;
  }
}

function updatePlayer() {
  direction.set(0, 0, 0);

  if (keys["w"] || mobileMoveZ < -0.2) direction.z -= 1;
  if (keys["s"] || mobileMoveZ > 0.2) direction.z += 1;
  if (keys["a"] || mobileMoveX < -0.2) direction.x -= 1;
  if (keys["d"] || mobileMoveX > 0.2) direction.x += 1;

  direction.normalize();

  const speed = keys["shift"] ? 0.32 : 0.20;

  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();

  const right = new THREE.Vector3();
  right.crossVectors(forward, camera.up).normalize();

  camera.position.addScaledVector(forward, -direction.z * speed);
  camera.position.addScaledVector(right, direction.x * speed);

  verticalVelocity -= gravity;
  camera.position.y += verticalVelocity;

  if (camera.position.y <= groundY) {
    camera.position.y = groundY;
    verticalVelocity = 0;
    onGround = true;
  }

  camera.position.x = THREE.MathUtils.clamp(camera.position.x, -105, 105);
  camera.position.z = THREE.MathUtils.clamp(camera.position.z, -105, 105);

  if (multiplayerEnabled && socket && socket.connected) {
    socket.emit("playerState", {
      roomCode,
      x: camera.position.x,
      y: camera.position.y - 2,
      z: camera.position.z,
      yaw
    });
  }
}

function updateWarden() {
  const playerPos = camera.position.clone();
  const wardenPos = warden.position.clone();

  const distance = playerPos.distanceTo(wardenPos);
  const dir = playerPos.sub(wardenPos).normalize();

  const speed = 0.15 + collected * 0.035;

  warden.position.addScaledVector(dir, speed);
  warden.position.y = 3;

  const staticAmount = Math.max(0, Math.min(0.95, 1 - distance / 50));
  staticOverlay.style.opacity = staticAmount;
  staticSound.volume = staticAmount;

  if (distance < 3.2) loseGame();
}

function updateSigils() {
  sigils.forEach(sigil => {
    if (sigil.userData.taken) return;

    sigil.rotation.y += 0.02;

    const d = camera.position.distanceTo(sigil.position);

    if (d < 3) {
      sigil.userData.taken = true;
      sigil.visible = false;
      collected++;
      ui.innerHTML = `Baseballs: ${collected} / 8`;

      if (collected >= 8) winGame();
    }
  });
}

function loseGame() {
  gameOver = true;

  ambient.pause();
  staticSound.pause();

  staticOverlay.style.opacity = 0;
  jumpscareScreen.style.display = "block";
  msg.style.display = "none";
  ui.style.display = "none";

  jumpAudio.pause();
  jumpAudio.currentTime = 0;
  jumpAudio.volume = 1;
  jumpAudio.play().catch(() => {});

  if (document.pointerLockElement) document.exitPointerLock();
}

function winGame() {
  gameOver = true;
  ambient.pause();
  staticSound.pause();

  msg.style.display = "flex";
  msg.innerHTML = "You collected all 8 baseballs.<br>You survived Forgotten Gonza.";

  if (document.pointerLockElement) document.exitPointerLock();
}

function animate() {
  requestAnimationFrame(animate);

  if (started && !gameOver) {
    updatePlayer();
    updateWarden();
    updateSigils();
  }

  renderer.render(scene, camera);
}
</script>
</body>
</html>
